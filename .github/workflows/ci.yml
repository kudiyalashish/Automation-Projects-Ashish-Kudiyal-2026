name: E-Commerce Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Tests with Maven
        run: mvn test -Dheadless=true

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestReport
          path: reports/TestReport.html

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Screenshots
          path: screenshots/